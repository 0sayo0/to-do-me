<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-olive-300">
    <div class="my-10">
      <h1 class="font-semibold text-4xl text-center text-zinc-700">
        Administrador de Tareas
      </h1>

      <main class="mt-16 text-center max-w-4xl mx-auto">
        <div class="flex justify-between">
          <button
            id="new-task"
            class="flex gap-2 bg-emerald-500 font-semibold text-white p-2 rounded rounded-lg cursor-pointer hover:bg-emerald-600 hover:-translate-y-1 transition-all"
          >
            Nueva tarea
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-plus-icon lucide-plus"
            >
              <path d="M5 12h14" />
              <path d="M12 5v14" />
            </svg>
          </button>

          <dialog
            id="modal-new-task"
            class="m-auto p-0 rounded-xl shadow-2xl backdrop:bg-black/50 backdrop:backdrop-blur-sm open:animate-fade-in focus:outline-none"
          >
            <form
              id="form-task"
              class="w-[500px] p-6 bg-white flex flex-col gap-6"
            >
              <h3 class="text-xl font-semibold text-gray-900">Nueva Tarea</h3>

              <div class="flex flex-col gap-6">
                <div class="flex flex-col gap-1">
                  <label for="title" class="text-sm font-medium text-gray-700"
                    >Título:</label
                  >
                  <input
                    id="title"
                    type="text"
                    placeholder="Ej. Hacer tarea"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all"
                  />
                </div>

                <div class="flex flex-col gap-1">
                  <label
                    for="description"
                    class="text-sm font-medium text-gray-700"
                    >Descripción:</label
                  >
                  <textarea
                    id="description"
                    placeholder="Describe la tarea"
                    rows="3"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all resize-none"
                  ></textarea>
                </div>
              </div>

              <div class="flex justify-end gap-3 mt-2">
                <button
                  type="button"
                  id="close-btn"
                  class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors"
                >
                  Cancelar
                </button>

                <button
                  type="submit"
                  class="px-4 py-2 text-sm font-medium text-white bg-emerald-500 rounded-lg hover:bg-emerald-600 transition-colors"
                >
                  Agregar
                </button>
              </div>
            </form>
          </dialog>

          <button
            id="delete-all"
            class="flex gap-2 bg-red-600 font-semibold text-white p-2 rounded rounded-lg cursor-pointer hover:bg-red-700 hover:-translate-y-1 transition-all"
          >
            Eliminar todo
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-trash2-icon lucide-trash-2"
            >
              <path d="M10 11v6" />
              <path d="M14 11v6" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
              <path d="M3 6h18" />
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
          </button>
        </div>

        <div id="task-container" class="mt-10 max-w-2xl mx-auto space-y-6">
          <p class="text-zinc-500">No hay tareas pendientes</p>
        </div>
      </main>
    </div>
    <script src="./js/app.js"></script>
  </body>
</html>
